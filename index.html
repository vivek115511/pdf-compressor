<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ZipPDF | 18MB to 2MB Fast</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="tool-card">
        <h2 style="color: #444;">Compress PDF</h2>
        <p style="color: #666; margin-bottom: 30px;">Optimized for 150MB+ Files</p>

        <div id="upload-stage">
            <input type="file" id="file-input" hidden>
            <button class="btn-main" onclick="document.getElementById('file-input').click()">
                Select PDF File
            </button>
            <div class="ad-space">ADVERTISEMENT</div>
        </div>

        <div id="process-stage" style="display:none;">
            <div style="background:#eee; border-radius:10px; height:10px; overflow:hidden; margin: 20px 0;">
                <div id="bar" style="background:var(--primary-red); width:0%; height:100%; transition:0.4s;"></div>
            </div>
            <p>Processing on Secure Server...</p>
            <div class="ad-space" style="height:200px;">MONETIZATION AD</div>
        </div>

        <div id="download-stage" style="display:none;">
            <p id="stat-result" style="font-weight:bold; color:var(--success-green);"></p>
            <button id="dl-btn" class="btn-download">Download Compressed PDF</button>
            <div class="ad-space">ADVERTISEMENT</div>
        </div>
    </main>

    <script src="scrift.js"></script>
</body>
</html>
