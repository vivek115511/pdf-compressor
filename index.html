<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZipPDF | Ultra-Fast 150MB Compressor</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
</head>
<body>
    <!-- TOP BANNER AD -->
    <div class="ad-unit banner-top">
        <p>SPONSORED AD</p>
        <!-- Paste AdSense Code Here -->
    </div>

    <main class="main-wrapper">
        <div class="compressor-card">
            <h1>Ultra PDF Compressor</h1>
            
            <div id="setup-area">
               <select id="target-size" class="big-select">
    <option value="0.5">🔥 Extreme (Shrink images 50%)</option>
    <option value="0.7">✅ Recommended (Shrink images 30%)</option>
    <option value="1.0">🛡️ Standard (No image scaling)</option>
         </select>

              <div class="drop-zone" onclick="document.getElementById('file-input').click()">
                    <input type="file" id="file-input" accept=".pdf" hidden>
                    <button class="huge-action-btn">COMPRESS 150MB PDF</button>
                    <p>Fast Data Processing • Secure • No Upload</p>
                </div>
            </div>

            <!-- AD SPACE IN MIDDLE OF WORKFLOW -->
            <div id="processing-area" style="display:none;">
                <div class="loader-container">
                    <div id="fill-bar"></div>
                </div>
                <p id="status-text">Analyzing Data Streams...</p>
                
                <div class="ad-unit processing-ad">
                    <p>Exclusive Offer for You</p>
                    <!-- Best spot for High CPC ads -->
                </div>
            </div>

            <div id="download-area" style="display:none;">
                <div class="success-box">
                    <h2 id="final-stats">150MB → 10MB</h2>
                    <button id="dl-btn" class="huge-success-btn">DOWNLOAD NOW</button>
                </div>
            </div>
        </div>
    </main>

    <!-- STICKY FOOTER AD -->
    <div class="ad-unit footer-sticky">
        <p>Advertisement</p>
    </div>

    <script src="scrift.js"></script>
</body>
</html>
