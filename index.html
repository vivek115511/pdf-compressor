<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro PDF Compressor | Extra Small & Fast</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
</head>
<body class="toolpage">

    <header class="header">
        <strong>ProCompressor</strong>
    </header>

    <div class="ad-slot top-ad">Advertisement</div>

    <main class="main-container">
        <div class="tool-card">
            <h1>Compress PDF</h1>
            <p>Extreme compression for files up to 150MB</p>

            <!-- Quality Selection - Big and Clear -->
            <div class="quality-box">
                <label>Select Compression Strength:</label>
                <select id="quality-level">
                    <option value="extreme">🔥 Extreme (Smallest File)</option>
                    <option value="recommended" selected>✅ Recommended (Small + Good Quality)</option>
                    <option value="low">🛡️ Low (High Quality Content)</option>
                </select>
            </div>

            <!-- THE BIG BUTTON -->
            <div id="workArea" class="workarea">
                <input type="file" id="file-input" accept="application/pdf" hidden>
                <button class="huge-btn" onclick="document.getElementById('file-input').click()">
                    CHOOSE PDF FILE
                </button>
                <p class="drag-text">or drag and drop here</p>
            </div>

            <!-- Progress State -->
            <div id="process" class="process-view" style="display:none;">
                <div class="loader-bar"><div id="progress-bar"></div></div>
                <p>Shrinking your file...</p>
                <div class="ad-slot rectangle-ad">Processing Ad</div>
            </div>

            <!-- Result State -->
            <div id="result" class="result-view" style="display:none;">
                <div class="status-msg">Success! File Size Reduced</div>
                <p id="size-report"></p>
                <button id="download-btn" class="huge-btn-success">DOWNLOAD COMPRESSED PDF</button>
            </div>
        </div>
    </main>

    <div class="ad-slot bottom-ad">Advertisement</div>

    <script src="scrift.js"></script>
</body>
</html>
